			const itemsToFit = document.getElementsByClassName('fitText');
			for (const item in itemsToFit) {
				if (Object.hasOwnProperty.call(itemsToFit, item)) {
					var element = itemsToFit[item];
					fitElement(element,1, 1000);
					element.classList.remove('fitText');
				}
			}
		}

		function fitElement(element, start, end){

			let size = (end + start) / 2;
			element.style.fontSize = `${size}px`;

			if(Math.abs(start - end) < 1){
				while(element.scrollHeight > element.offsetHeight){
					size--;
					element.style.fontSize = `${size}px`;
				}
				return;
			}

			if(element.scrollHeight > element.offsetHeight){
				fitElement(element, start, size);
			} else {
				fitElement(element, size, end);
			}		
		}


		document.onreadystatechange = () => {
			fitElements();

## setting the stage 

notation and forward/backward computations;
</div></script></section><section data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 1200px; width: 1920px; min-height: 1200px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

<div class="" style="padding: 10px 10px 10px 10px; box-sizing: border-box; position: absolute; left: 0%; top: 0%; height: 10%; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: flex-end" align="bottom">

 <div class="block">

### the humble `$(d_{out} \times d_{in})$` linear layer
</div>

 
</div>

<div class="" style="padding: 10px 10px 10px 10px; box-sizing: border-box; position: absolute; left: 0%; top: 10%; height: 85%; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: flex-start" align="top">

 



<div class="" style="font-size: 32px; position: absolute; left: 5%; top: 5%; height: 40%; width: 45%; display: flex; flex-direction: column; align-items: flex-start; justify-content: flex-start" align="left">

<div class="callout callout-color1">
<div class="callout-title">
<div class="callout-icon">

<i class="fas fa-info-circle" ></i>


</div>
<div class="callout-title-inner">

Forward pass (preactivation computation)

</div>
</div>
<div class="callout-content">

- **Vector-wise:** `$h = W x + b$`

- **Element-wise:** `$h_{i} = \sum_{j}^{d_{in}} \: (W_{ij} \: x_{j}) + b_{i}$`

- **Loss function:** `$L = f(h)$` for some function `$f$`

</div>
</div>
<!-- .element: style="width: 100%" -->
</div>

<div class="" style="font-size: 32px; position: absolute; left: 5%; top: 50%; height: 40%; width: 45%; display: flex; flex-direction: column; align-items: flex-start; justify-content: flex-start" align="left">

<div class="callout callout-color1">
<div class="callout-title">
<div class="callout-icon">

<i class="fas fa-info-circle" ></i>


</div>
<div class="callout-title-inner">

Backward pass (gradient computation)

</div>
</div>
<div class="callout-content">

- **Outputs:** `$\nabla h = \frac{dL}{dh_{i}}$` (assume known)

- **Weights:** `$\nabla W_{ij} = \frac{dL}{dh_{i}} \frac{dh_{i}}{dW_{ij}} = \nabla h_{i} \: x_j$`

- **Bias:**  `$\nabla b_{i} = \frac{dL}{dh_{i}} \frac{dh_{i}}{db_{i}} = \nabla h_{i}$`

- **Input:** `$\nabla x_{j} = \sum_{i}^{d_{out}} \:  \frac{dL}{dh_{i}} \frac{dh_{i}}{dx_{j}} = \sum_{i}^{d_{out}} \: \nabla h_{i} \: W_{ij} $`

</div>
</div>
<!-- .element: style="width: 100%" -->
</div>

<div class="" style="font-size: 24px; position: absolute; left: 55%; top: 5%; height: 40%; width: 40%; display: flex; flex-direction: column; align-items: flex-start; justify-content: flex-start" align="left">

<div class="callout callout-color8">
<div class="callout-title">
<div class="callout-icon">

<i class="fas fa-list" ></i>


</div>
<div class="callout-title-inner">

Notation

</div>
</div>
<div class="callout-content">

- `$W$` is the `$(d_{out} \times d_{in})$` weight matrix of the layer;

- `$h$` is the `$d_{out}$` vector of "preactivations" output by the layer;

- `$x$` is the `$d_{in}$` vector of features input to the layer;

- `$b$` is the `$d_{out}$`-dimensional bias vector of the layer;

</div>
</div>
<!-- .element: style="width: 100%" -->
</div>

<div class="" style="font-size: 24px; position: absolute; left: 55%; top: 50%; height: 40%; width: 40%; display: flex; flex-direction: column; align-items: flex-start; justify-content: flex-start" align="left">

<div class="callout callout-color5">
<div class="callout-title">
<div class="callout-icon">

<i class="fas fa-exclamation-triangle" ></i>


</div>
<div class="callout-title-inner">

Question you should be asking yourself

</div>
</div>
<div class="callout-content">

- `$h_{i}$` is a sum of `$d_{in}$` terms.

- `$\nabla x_{j}$`  is a sum of `$d_{out}$` terms.

- **What happens when `$d_{in}$` or `$d_{out}$` grow?**

</div>
</div>
<!-- .element: style="width: 100%" -->
</div>
 
</div>

<div class="" style="padding: 10px 10px 10px 10px; box-sizing: border-box; position: absolute; left: 0%; top: 95%; height: 5%; width: 100%; display: flex; flex-direction: column; align-items: flex-end; justify-content: flex-end" align="right">


</div>

 <div class="block">

### aside on `$d_{out}$`, `$d_{in}$` and neural network width `$n$`
</div>

 
</div>

<div class="" style="padding: 10px 10px 10px 10px; box-sizing: border-box; position: absolute; left: 0%; top: 10%; height: 85%; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: flex-start" align="top">

 


<div class="" style="font-size: 32px; position: absolute; left: 25%; top: 20%; height: 40%; width: 50%; display: flex; flex-direction: column; align-items: flex-start; justify-content: flex-start" align="left">

Typically (and throughout this presentation) we assume:

- Input or embedding layers are `$n \times d_{in}$` <br> 
  (where `$d_{in}$` is the data input dimensionality).

- Hidden layers are `$n \times n$` <br> 
  (where `$n$` is the model width or hidden dimensionality).

- Output or unembedding layers are `$d_{out} \times n$` <br>
  (where `$d_{out}$` is the data output dimensionality) 
</div>

 
</div>

<div class="" style="padding: 10px 10px 10px 10px; box-sizing: border-box; position: absolute; left: 0%; top: 95%; height: 5%; width: 100%; display: flex; flex-direction: column; align-items: flex-end; justify-content: flex-end" align="right">

## problem # 1

scaling width leads to _preactivation instability_
</div></script></section><section data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 1200px; width: 1920px; min-height: 1200px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

<div class="" style="padding: 10px 10px 10px 10px; box-sizing: border-box; position: absolute; left: 0%; top: 0%; height: 10%; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: flex-end" align="bottom">

 <div class="block">

### how do preactivations `$h_{i}$` scale in the infinite width limit? 
</div>

 
</div>

<div class="" style="padding: 10px 10px 10px 10px; box-sizing: border-box; position: absolute; left: 0%; top: 10%; height: 85%; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: flex-start" align="top">

 


What happens to:  `$\quad h_{i} = \sum_{j}^{n} \: W_{ij} \: x_{j} \quad \text{as} \quad n \rightarrow \infty$` 

when:  `$\quad W_{ij} \sim \mathcal{N}(0,1) \quad \text{and} \quad x_{j}  \sim \mathcal{N}(0,1)$` 

(i.e. at initialization)

<img src="msc/IFT 6760 W24 Presentation/attachments/plot_clt-percentiles.png" alt="" style="width: 1200px; object-fit: fill">


The mean of `$h_{i}$` remains `$\sim 0$` its the variance explodes with `$n$`
 
</div>

<div class="" style="padding: 10px 10px 10px 10px; box-sizing: border-box; position: absolute; left: 0%; top: 95%; height: 5%; width: 100%; display: flex; flex-direction: column; align-items: flex-end; justify-content: flex-end" align="right">


</div>
</div></script></section><section data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 1200px; width: 1920px; min-height: 1200px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

<div class="" style="padding: 10px 10px 10px 10px; box-sizing: border-box; position: absolute; left: 0%; top: 0%; height: 10%; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: flex-end" align="bottom">

 <div class="block">

### the standard deviation of `$h_i$` scales with `$\sqrt{n}$`
</div>

 
</div>

<div class="" style="padding: 10px 10px 10px 10px; box-sizing: border-box; position: absolute; left: 0%; top: 10%; height: 85%; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: flex-start" align="top">

 

This is a problem. Why? 

<img src="msc/IFT 6760 W24 Presentation/attachments/plot_clt-std-scaling.png" alt="" style="width: 1000px; object-fit: fill">


 
</div>

<div class="" style="padding: 10px 10px 10px 10px; box-sizing: border-box; position: absolute; left: 0%; top: 95%; height: 5%; width: 100%; display: flex; flex-direction: column; align-items: flex-end; justify-content: flex-end" align="right">


</div>
</div>

<aside class="notes"><p>extreme case, numerical instability (compounded in multi-layer). More generally, vanishing gradient for saturating non-linear activations; and exploding gradients for unbounded activations (where the next layer&#39;s <code>$x_{j}$</code> (and therefore <code>$\nabla W_{ij}$</code>) is proportional <code>$h_{j}$</code>).</p>
</aside></script></section><section data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 1200px; width: 1920px; min-height: 1200px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

<div class="" style="padding: 10px 10px 10px 10px; box-sizing: border-box; position: absolute; left: 0%; top: 0%; height: 10%; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: flex-end" align="bottom">

 <div class="block">

### solution: scale `$W_{ij}$`  (hyperparameter # 1)
</div>

 
</div>

<div class="" style="padding: 10px 10px 10px 10px; box-sizing: border-box; position: absolute; left: 0%; top: 10%; height: 85%; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: flex-start" align="top">

 


We can prevent `$h_i$` instability by scaling `$W_{ij}$` to have `$O(n^{1/2})$` standard deviation. 

This is the crux of "Standard Parametrization" (e.g. kaiming or xavier initialization).

<img src="msc/IFT 6760 W24 Presentation/attachments/plot_clt-adjusted-percentiles.png" alt="" style="width: 1200px; object-fit: fill">


Alternatively, can use a static multiplier parameter `$m \propto n^{-1/2}$` where `$h = (m \: W) \: x + b$`
 
</div>

<div class="" style="padding: 10px 10px 10px 10px; box-sizing: border-box; position: absolute; left: 0%; top: 95%; height: 5%; width: 100%; display: flex; flex-direction: column; align-items: flex-end; justify-content: flex-end" align="right">


</div>
</div></script></section><section data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 1200px; width: 1920px; min-height: 1200px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## problem # 2

 correlations after gradient updates change scaling behavior;
</div></script></section><section data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 1200px; width: 1920px; min-height: 1200px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

<div class="" style="padding: 10px 10px 10px 10px; box-sizing: border-box; position: absolute; left: 0%; top: 0%; height: 10%; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: flex-end" align="bottom">

 <div class="block">

### when `$W_{ij}$` and `$x_j$` are uncorrelated, the std of `$h_i$` scales with `$\sqrt{n}$` by CLT
</div>

 
</div>

<div class="" style="padding: 10px 10px 10px 10px; box-sizing: border-box; position: absolute; left: 0%; top: 10%; height: 85%; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: flex-start" align="top">

 



<div class="" style="font-size: 28px; padding: 10px 30px 10px 30px; box-sizing: border-box; display: flex; flex-direction: column; align-items: center; justify-content: space-evenly" align="justify">

<div class="callout callout-color1">
<div class="callout-title">
<div class="callout-icon">

<i class="fas fa-info-circle" ></i>


</div>
<div class="callout-title-inner">

Central limit theorem (CLT) scaling

</div>
</div>
<div class="callout-content">

When `$W_{ij}$` and `$x_j$` are uncorrelated and zero-mean (i,e, at intialization):

- `$\mu = \mathrm{E}[W_{ij}x_j] = 0, \quad \sigma^{2} = \mathrm{Var}[W_{ij}x_j]= \mathrm{Var}[W_{ij}] \: \mathrm{Var}[x_j]$`

- **by CLT:** `$\quad \frac{1}{\sqrt{n}} \sum_{j}^{n} W_{ij}x_j \to \mathcal{N}(0, \sigma^2) \quad \text{as} \; n \to \infty$`

***************

`$\quad \therefore \mathrm{Var}[h_{i}] \to n \cdot \mathrm{Var}[W_{ij}] \: \mathrm{Var}[x_j] \quad \text{as} \; n \to \infty$`.

</div>
</div>
</div>
<!-- .element: style="width: 80%" -->

To ensure `$\mathrm{Var}[h_{i}]$` is stable, i.e. `$O(1)$`; we must ensure `$\mathrm{Var}[W_{ij}]$` is `$O(n^{-1})$`. Equivalently, we ensure `$W$` has `$O(n^{-1/2})$` standard deviation.
<!-- .element: style="width: 60%" -->

We could also adjust `$\mathrm{Var}[x_{j}]$` , but that's a can of worms best to avoid for now. We'll instead assume as in the original papers that all layer inputs and outputs should be `$O(1)$` throughout training.
<!-- .element: style="width: 60%" -->
 
</div>

<div class="" style="padding: 10px 10px 10px 10px; box-sizing: border-box; position: absolute; left: 0%; top: 95%; height: 5%; width: 100%; display: flex; flex-direction: column; align-items: flex-end; justify-content: flex-end" align="right">


</div>
</div></script></section><section data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 1200px; width: 1920px; min-height: 1200px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

<div class="" style="padding: 10px 10px 10px 10px; box-sizing: border-box; position: absolute; left: 0%; top: 0%; height: 10%; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: flex-end" align="bottom">

 <div class="block">

### when `$W_{ij}$` and `$x_j$` are correlated, the mean of `$h_i$` scales with `$n$` by LLN
</div>

 
</div>

<div class="" style="padding: 10px 10px 10px 10px; box-sizing: border-box; position: absolute; left: 0%; top: 10%; height: 85%; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: flex-start" align="top">

 



<div class="" style="font-size: 28px; padding: 10px 30px 10px 30px; box-sizing: border-box; display: flex; flex-direction: column; align-items: center; justify-content: space-evenly" align="justify">

<div class="callout callout-color5">
<div class="callout-title">
<div class="callout-icon">

<i class="fas fa-exclamation-triangle" ></i>


</div>
<div class="callout-title-inner">

Law of large numbers (LLN) scaling

</div>
</div>
<div class="callout-content">

When `$W_{ij}$` and `$x_j$` are correlated (i.e. after a gradient update with `$\Delta W_{ij} \propto x_j$` ):

- `$\mu = \mathrm{E}[(W_{ij} + \Delta W_{ij})x_j] \neq 0$`

- **by LLN:** `$\quad \frac{1}{n} \sum_{j}^{n} (W_{ij} + \Delta W_{ij}) x_j \to \mathrm{E}[\Delta W_{ij}x_j] \quad \text{as} \; n \to \infty$`

***************

`$\quad \therefore \mathrm{E}[h_i] \to n \cdot \mathrm{E}[\Delta W_{ij} x_j] \quad \text{as} \; n \to \infty \quad$` (i.e. mean scales with `$n$`).

</div>
</div>
</div>
<!-- .element: style="width: 80%" -->

To ensure `$\mathrm{E}[h_{i}]$` is stable, i.e. `$O(1)$`; we must ensure `$\mathrm{E}[\Delta W_{ij} x_j]$` is `$O(n^{-1})$`. 
Recall that `$x_j$` is `$O(1)$`, and so we can ensure `$\Delta W_{ij}$` must be `$O(n^{-1})$` instead.  
<!-- .element: style="width: 60%" -->
 
</div>

<div class="" style="padding: 10px 10px 10px 10px; box-sizing: border-box; position: absolute; left: 0%; top: 95%; height: 5%; width: 100%; display: flex; flex-direction: column; align-items: flex-end; justify-content: flex-end" align="right">


</div>
</div></script></section><section data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 1200px; width: 1920px; min-height: 1200px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

<div class="" style="padding: 10px 10px 10px 10px; box-sizing: border-box; position: absolute; left: 0%; top: 0%; height: 10%; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: flex-end" align="bottom">

 <div class="block">

### solution: scale learning rate (hyperparameter # 2)
</div>

 
</div>

<div class="" style="padding: 10px 10px 10px 10px; box-sizing: border-box; position: absolute; left: 0%; top: 10%; height: 85%; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: flex-start" align="top">

 


In SGD with learning rate `$\eta$`, we have `$\Delta W_{ij} = \eta \nabla h_{i} x_{j}$` 
and our constraint simplifies to  `$\eta \nabla h_i$` having to be `$O(n^{-1})$`. 
<!-- .element: style="width: 45%" -->

<div class="" style="font-size: 24; padding: 10px 30px 10px 30px; box-sizing: border-box; display: flex; flex-direction: column; align-items: center; justify-content: space-evenly" align="justify">

<div class="callout callout-color1">
<div class="callout-title">
<div class="callout-icon">

<i class="fas fa-info-circle" ></i>


</div>
<div class="callout-title-inner">

Output Layer `$U$`

</div>
</div>
<div class="callout-content">

-  `$h^{(U)}$` is typically a  `$d_{out}$` logit vector with  `$O(1)$` gradients `$\nabla h^{(U)}$`;

- e.g. for the cross-entropy loss with ground-truth class `$k$` and probabilities `$p = \mathrm{softmax}(h)$`, we have `$\nabla h_{i = k} = 1 - p_{i}$` and `$\nabla h_{i \neq k} = p_{i}$`.

****************

`$\quad \therefore \: \eta^{(U)} = O(n^{-1})$` ensures that `$\Delta W^{(U)} = O(n^{-1})$` <br>

`$\qquad$` and `$h^{(U)}$` remains `$O(1)$` throughout training despite LLN scaling.

</div>
</div>
</div>
<!-- .element: style="width: 60%" -->
 
</div>

<div class="" style="padding: 10px 10px 10px 10px; box-sizing: border-box; position: absolute; left: 0%; top: 95%; height: 5%; width: 100%; display: flex; flex-direction: column; align-items: flex-end; justify-content: flex-end" align="right">


</div>
</div></script></section><section data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 1200px; width: 1920px; min-height: 1200px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## problem # 3

naively adjusting for problem # 2 does not admit *feature learning*
</div></script></section><section data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 1200px; width: 1920px; min-height: 1200px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

<div class="" style="padding: 10px 10px 10px 10px; box-sizing: border-box; position: absolute; left: 0%; top: 0%; height: 10%; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: flex-end" align="bottom">

 <div class="block">

### what does it mean to "not admit feature learning"?
</div>

 
</div>

<div class="" style="padding: 10px 10px 10px 10px; box-sizing: border-box; position: absolute; left: 0%; top: 10%; height: 85%; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: flex-start" align="top">

 


When a parametrization is said to "not admit feature learning", this implies that the change in input features `$\Delta x$`  as a result of gradient descent become vanishingly small with scale, i.e. `$O(n^{a})$` with `$a < 0$`. 
<!-- .element: style="width: 60%" -->

<img src="msc/IFT 6760 W24 Presentation/attachments/def_featurea-learning-1a.png" alt="" style="object-fit: scale-down">

<img src="msc/IFT 6760 W24 Presentation/attachments/def_feature-learning-1b.png" alt="" style="object-fit: scale-down">


<img src="msc/IFT 6760 W24 Presentation/attachments/def_feature-learning-2a.png" alt="" style="object-fit: scale-down">

<img src="msc/IFT 6760 W24 Presentation/attachments/def_feature-learning-2b.png" alt="" style="object-fit: scale-down">



 
</div>

<div class="" style="padding: 10px 10px 10px 10px; box-sizing: border-box; position: absolute; left: 0%; top: 95%; height: 5%; width: 100%; display: flex; flex-direction: column; align-items: flex-end; justify-content: flex-end" align="right">

<div class="block">

https://arxiv.org/abs/2011.14522
</div>



</div>
</div></script></section><section data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 1200px; width: 1920px; min-height: 1200px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

<div class="" style="padding: 10px 10px 10px 10px; box-sizing: border-box; position: absolute; left: 0%; top: 0%; height: 10%; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: flex-end" align="bottom">

 <div class="block">

### `$O(n^{-1})$` learning rates prevent feature learning in  hidden layers
</div>

 
</div>

<div class="" style="padding: 10px 10px 10px 10px; box-sizing: border-box; position: absolute; left: 0%; top: 10%; height: 85%; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: flex-start" align="top">

 



In SGD with learning rate `$\eta$`, we have `$\Delta W_{ij} = \eta \nabla h_{i} x_{j}$` 
and our constraint simplifies to  `$\eta \nabla h_i$` having to be `$O(n^{-1})$`
<!-- .element: style="width: 45%" -->

<div class="" style="font-size: 20; padding: 10px 30px 10px 30px; box-sizing: border-box; display: flex; flex-direction: column; align-items: center; justify-content: space-evenly" align="justify">

<div class="callout callout-color5">
<div class="callout-title">
<div class="callout-icon">

<i class="fas fa-exclamation-triangle" ></i>


</div>
<div class="callout-title-inner">

Final hidden layer `$L$` and hidden layers `$\ell \in [1,L]$`

</div>
</div>
<div class="callout-content">

-  `$\nabla h^{(L)}_i$` typically scales like `$\nabla x^{(U)}_i = \sum_{c}^{d_{out}} \nabla h^{(U)}_{c} W^{(U)}_{ci}$`<br>

`$\qquad$` Note that `$\nabla x_j$` is a sum of `$d_{out} \neq n$` terms; and recall that <br>

`$\qquad$`  `$\nabla h^{(U)}=O(1)$` and `$W^{(U)}=O(n^{-1/2})$`

**********

`$\quad \therefore \: \nabla h^{(L)} = O(n^{-1/2})$` such that  `$\eta^{(L)} = O(n^{-1})$`  results in<br>

`$\qquad$` `$\Delta W^{(L)} = O(n^{-3/2})$` and `$\Delta x^{(U)} \propto \Delta h^{(L)}=O(n^{-1/2})$`<br>

`$\qquad$` **i.e. feature learning `$\Delta x^{(U)}$` vanishes with large `$n$`.**

**********

`$\qquad$` Note that  `$\nabla x^{(L)}_j = \sum_{i}^{n} \nabla h^{(L)}_{i} W^{(L)}_{ij} = O(n^{-1/2})$` such that <br>

`$\qquad$` this should generalize to hidden layers `$\ell \in [1,L]$` as long as <br>

`$\qquad$` `$\nabla x^{(\ell+1)} \propto \nabla h^{(\ell)}$` which is typically true for e.g. MLPs or resnets.



</div>
</div>
</div>
<!-- .element: style="width: 60%" -->

 
</div>

<div class="" style="padding: 10px 10px 10px 10px; box-sizing: border-box; position: absolute; left: 0%; top: 95%; height: 5%; width: 100%; display: flex; flex-direction: column; align-items: flex-end; justify-content: flex-end" align="right">


</div>
</div></script></section><section data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 1200px; width: 1920px; min-height: 1200px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

<div class="" style="padding: 10px 10px 10px 10px; box-sizing: border-box; position: absolute; left: 0%; top: 0%; height: 10%; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: flex-end" align="bottom">

 <div class="block">

### elaborating on the lack of feature learning
</div>

 
</div>

<div class="" style="padding: 10px 10px 10px 10px; box-sizing: border-box; position: absolute; left: 0%; top: 10%; height: 85%; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: flex-start" align="top">

 

<div class="" style="font-size: 20; padding: 10px 30px 10px 30px; box-sizing: border-box; display: flex; flex-direction: column; align-items: center; justify-content: space-evenly" align="justify">

<div class="callout callout-color1">
<div class="callout-title">
<div class="callout-icon">

<i class="fas fa-info-circle" ></i>


</div>
<div class="callout-title-inner">

How does feature learning vanish in the limit?

</div>
</div>
<div class="callout-content">

- We can show that `$\Delta h^{(\ell)} = (W \Delta x  + \Delta W x + \Delta W \Delta x + \Delta b)^{(\ell)}$`

- In the input layer, `$\Delta x^{(in)} = 0$`, and `$\Delta h^{(in)} = (\Delta W x + \Delta b)^{(in)}$`

- Recall that `$\Delta W x$` scales by LLN with `$n \cdot O(\Delta W) \cdot O(x)$`;

- If `$\Delta W^{(in)} = O(n^{-3/2})$`, then `$\Delta h^{(in)} = O(n^{-1/2})$`.

- Typically for MLPs or ResNets, `$O(\Delta x^{(\ell+1)}) = O(\Delta h^{(\ell)})$`.

****************

`$\quad \therefore O(\Delta x^{(l)}) = O(\Delta h^{(in)}) = O(n^{-1/2})$` <br>

`$\qquad$` and the solution does not admit feature learning

`$\qquad$` except in cases where `$\Delta W = O(n^{-1})$`.

</div>
</div>
</div>
<!-- .element: style="width: 60%" -->
 
</div>

<div class="" style="padding: 10px 10px 10px 10px; box-sizing: border-box; position: absolute; left: 0%; top: 95%; height: 5%; width: 100%; display: flex; flex-direction: column; align-items: flex-end; justify-content: flex-end" align="right">


</div>
</div></script></section><section data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 1200px; width: 1920px; min-height: 1200px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

<div class="" style="padding: 10px 10px 10px 10px; box-sizing: border-box; position: absolute; left: 0%; top: 0%; height: 10%; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: flex-end" align="bottom">

 <div class="block">

### aside on separate learning rates
</div>

 
</div>

<div class="" style="padding: 10px 10px 10px 10px; box-sizing: border-box; position: absolute; left: 0%; top: 10%; height: 85%; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: flex-start" align="top">

 


<div class="" style="font-size: 18; padding: 10px 30px 10px 30px; box-sizing: border-box; display: flex; flex-direction: column; align-items: center; justify-content: space-evenly" align="justify">

<div class="callout callout-color4">
<div class="callout-title">
<div class="callout-icon">

<i class="fas fa-question-circle" ></i>


</div>
<div class="callout-title-inner">

Question I have. Thoughts?

</div>
</div>
<div class="callout-content">

In principle, you could use learning rates `$O(n^{-1})$` for output layers, <br>

`$O(n^{-1/2})$`  for hidden layers, and `$O(n^{1/2})$`  for input layers such that <br>

`$\Delta W$` scales with `$n$` in a way which ensures `$\Delta h$` does not vanish.

*******************************

However the original `$\mu$`P paper uses global learning rates. There might be a good reason for this, but I'm not aware of it.  The follow-up `$\mu$`-Transfer loosens this restriction but maintains `$O(1)$` learning rates on hidden weights across variants of equivalent `$\mu$`P implementation. Not clear to me if the reason for this is empirical, grounded in theory, or arbitrary.

</div>
</div>
</div>
<!-- .element: style="width: 60%" -->


 
</div>

<div class="" style="padding: 10px 10px 10px 10px; box-sizing: border-box; position: absolute; left: 0%; top: 95%; height: 5%; width: 100%; display: flex; flex-direction: column; align-items: flex-end; justify-content: flex-end" align="right">

<div class="block">

http://arxiv.org/abs/2011.14522
</div>



</div>
</div></script></section><section data-markdown><script type="text/template"><!-- .slide: class="drop" -->

<div class="" style="padding: 10px 10px 10px 10px; box-sizing: border-box; position: absolute; left: 0%; top: 10%; height: 85%; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: flex-start" align="top">

<div class="" style="position: absolute; left: 0px; top: 0px; height: 1200px; width: 1920px; min-height: 1200px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

<div class="" style="padding: 10px 10px 10px 10px; box-sizing: border-box; position: absolute; left: 0%; top: 0%; height: 10%; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: flex-end" align="bottom">

 <div class="block">

### Add multiplier to forward and backward computations
</div>

 
</div>

<div class="" style="padding: 10px 10px 10px 10px; box-sizing: border-box; position: absolute; left: 0%; top: 10%; height: 85%; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: flex-start" align="top">

 



<div class="" style="font-size: 32px; position: absolute; left: 5%; top: 5%; height: 40%; width: 45%; display: flex; flex-direction: column; align-items: flex-start; justify-content: flex-start" align="left">

<div class="callout callout-color1">
<div class="callout-title">
<div class="callout-icon">

<i class="fas fa-info-circle" ></i>


</div>
<div class="callout-title-inner">

Forward pass (preactivation computation)

</div>
</div>
<div class="callout-content">

- **Vector-wise:** `$h = m W x + b$`

- **Element-wise:** `$h_{i} = \sum_{j}^{d_{in}} \: (m W_{ij} \: x_{j}) + b_{i}$`

- **Loss function:** `$L = f(h)$` for some function `$f$`

</div>
</div>
<!-- .element: style="width: 100%" -->
</div>

<div class="" style="font-size: 32px; position: absolute; left: 5%; top: 50%; height: 40%; width: 45%; display: flex; flex-direction: column; align-items: flex-start; justify-content: flex-start" align="left">

<div class="callout callout-color1">
<div class="callout-title">
<div class="callout-icon">

<i class="fas fa-info-circle" ></i>


</div>
<div class="callout-title-inner">

Backward pass (gradient computation)

</div>
</div>
<div class="callout-content">

- **Outputs:** `$\nabla h = \frac{dL}{dh_{i}}$` (assume known)

- **Weights:** `$\nabla W_{ij} = \frac{dL}{dh_{i}} \frac{dh_{i}}{dW_{ij}} = \nabla h_{i} \: m \: x_j$`

- **Bias:**  `$\nabla b_{i} = \frac{dL}{dh_{i}} \frac{dh_{i}}{db_{i}} = \nabla h_{i}$`

- **Input:** `$\nabla x_{j} = \sum_{i}^{d_{out}} \:  \frac{dL}{dh_{i}} \frac{dh_{i}}{dx_{j}} = \sum_{i}^{d_{out}} \: \nabla h_{i} \: m \: W_{ij} $`

</div>
</div>
<!-- .element: style="width: 100%" -->
</div>

<div class="" style="font-size: 24px; position: absolute; left: 55%; top: 5%; height: 40%; width: 40%; display: flex; flex-direction: column; align-items: flex-start; justify-content: flex-start" align="left">

<div class="callout callout-color8">
<div class="callout-title">
<div class="callout-icon">

<i class="fas fa-list" ></i>


</div>
<div class="callout-title-inner">

Notation

</div>
</div>
<div class="callout-content">

- `$W$` is the `$(d_{out} \times d_{in})$` weight matrix of the layer;

- `$h$` is the `$d_{out}$` vector of "preactivations" output by the layer;

- `$x$` is the `$d_{in}$` vector of features input to the layer;

- `$b$` is the `$d_{out}$`-dimensional bias vector of the layer;

- `$m$` is a fixed scalar multiplier for `$W$`, or equivalently for `$h$` or `$x$`.

</div>
</div>
<!-- .element: style="width: 100%" -->
</div>

<div class="" style="font-size: 24px; position: absolute; left: 55%; top: 50%; height: 40%; width: 40%; display: flex; flex-direction: column; align-items: flex-start; justify-content: flex-start" align="left">

<div class="callout callout-color5">
<div class="callout-title">
<div class="callout-icon">

<i class="fas fa-exclamation-triangle" ></i>


</div>
<div class="callout-title-inner">

Desiderata

</div>
</div>
<div class="callout-content">

1. Stable `$h$` and therefore `$x$` in infinite width limit.

2. Stable and maximal `$\Delta x$` in infinite width limit.

3. CLT vs LLN scaling aware.

</div>
</div>
<!-- .element: style="width: 100%" -->
</div>
 
</div>

<div class="" style="padding: 10px 10px 10px 10px; box-sizing: border-box; position: absolute; left: 0%; top: 95%; height: 5%; width: 100%; display: flex; flex-direction: column; align-items: flex-end; justify-content: flex-end" align="right">

</div></script></section><section data-markdown><script type="text/template"><!-- .slide: class="drop" -->

**Output and hidden layers with `$d_{in}=n$` (CLT scaling):** <br>

**Input layers with `$d_{in}\neq n$` (no scaling):** <br>

We want `$O(h) = O(1)$` for `$h = \sum_{j}^{d_{in}} (mW_{ij}x_j) + b$`

- `$W:  \quad O(m) \cdot O(W) \cdot O(x) = O(1)$`



**Bias weights:**

- `$b:  \;\;\quad O(b) = O(1)$`

</div>
</div>
</div>

**Output and hidden layer weights with `$d_{in}=n$` (LLN scaling):** <br>

- `$\Delta b:  \;\;\quad O(\eta) \cdot O(\nabla h) = O(1)$`

</div>

    <script>
      function extend() {
        var target = {};
        for (var i = 0; i < arguments.length; i++) {
          var source = arguments[i];
          for (var key in source) {
            if (source.hasOwnProperty(key)) {
              target[key] = source[key];
            }
          }
        }
        return target;
      }

	  function isLight(color) {
		let hex = color.replace('#', '');

		// convert #fff => #ffffff
		if(hex.length == 3){
			hex = `${hex[0]}${hex[0]}${hex[1]}${hex[1]}${hex[2]}${hex[2]}`;
		}

		const c_r = parseInt(hex.substr(0, 2), 16);
		const c_g = parseInt(hex.substr(2, 2), 16);
		const c_b = parseInt(hex.substr(4, 2), 16);
		const brightness = ((c_r * 299) + (c_g * 587) + (c_b * 114)) / 1000;
		return brightness > 155;
	}

	var bgColor = getComputedStyle(document.documentElement).getPropertyValue('--r-background-color').trim();
	var isLight = isLight(bgColor);

	if(isLight){
		document.body.classList.add('has-light-background');
	} else {
		document.body.classList.add('has-dark-background');
	}

      // default options to init reveal.js
      var defaultOptions = {
